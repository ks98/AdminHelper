services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf.template:/etc/nginx/conf.d/default.conf.template:ro
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - server
    networks:
      - backend
    restart: unless-stopped

  server:
    image: ${SERVER_IMAGE:-docker.nevondo.com/NAMESPACE/simpleremotemanager/server:latest}
    volumes:
      - ./data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      # IP-Zugangsbeschränkung (leer = kein Filter)
      # Beispiel: ALLOWED_IPS=192.168.1.0/24,10.0.0.5
      - ALLOWED_IPS=
      # Auf true setzen wenn hinter Reverse-Proxy (X-Forwarded-For auswerten)
      # Wird ignoriert wenn TRUSTED_PROXIES gesetzt ist.
      - TRUST_PROXY_HEADERS=false
      # Nur von nginx (bekanntes Docker-Subnet) Forwarded-Header akzeptieren
      - TRUSTED_PROXIES=172.20.0.0/24
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

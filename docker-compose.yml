# Bounded container logs: Docker's default json-file driver grows unbounded
# until the disk fills. This anchor caps every service at 5×10 MB and is applied
# below via `logging: *default-logging`. Kept inline (no external file) so this
# compose stays self-contained and distributable on its own.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
    environment:
      - POSTGRES_USER=adminhelper
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=adminhelper
      - TZ=${TZ:-Europe/Berlin}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # The monitoring DB (adminhelper_monitor) is created by the monitoring
      # service's entrypoint, not a bind-mounted init script — this keeps
      # docker-compose.yml free of repo-file bind mounts (single self-contained
      # file, distributable on its own).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adminhelper -d adminhelper"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging
    restart: unless-stopped
    # KEIN ports:-Mapping - Postgres ist nur intern im Compose-Network erreichbar.

  server:
    image: ${SERVER_IMAGE:-ghcr.io/ks98/adminhelper/server:latest}
    # No host port: the server listens plain-HTTP on the compose network only.
    # The gateway is the single public TLS edge and proxies to server:8080. This
    # is what makes the gateway's X-Client-* identity header unforgeable — there
    # is no direct path to this socket from the host (ADR 0001 §3.2).
    expose:
      - "8080"
    volumes:
      - ./data:/app/data
      # frps.toml only (non-secret); frps reads it read-only. The frps TLS
      # material now comes from the ca-issuer under the tunnel intermediate (A7),
      # not a server-run FRP CA (D6/F3 — the old frp-pki master volume is gone).
      - frp-config:/app/frp-config
    environment:
      - TZ=${TZ:-Europe/Berlin}
      # Log verbosity for the app + uvicorn loggers (DEBUG/INFO/WARNING/ERROR).
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DOMAIN=${DOMAIN:-localhost}
      - EXTRA_SANS=${EXTRA_SANS:-}
      # Uvicorn worker count. Default 1 (single-worker). Set >1 to scale across
      # CPU cores; requires the `scheduler` service (below) so APScheduler jobs
      # still run exactly once, and Redis for shared rate-limiting (already set).
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-1}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # mTLS enforcement (per-route cert-scope check). Default true = enforced
      # (reject protected routes without a valid cert); set false for a permissive
      # window (e.g. a manual first-admin bootstrap). Flipped together with the
      # gateway. scripts/install.sh mints the first cert out-of-band; see docs (Betrieb).
      - MTLS_ENFORCE=${MTLS_ENFORCE:-true}
      - FRP_CONFIG_DIR=/app/frp-config
      # Postgres
      - DATABASE_URL=postgresql+psycopg://adminhelper:${POSTGRES_PASSWORD}@postgres:5432/adminhelper
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=adminhelper
      - PGPASSWORD=${POSTGRES_PASSWORD}
      # Monitoring-Proxy
      - MONITOR_SERVICE_URL=http://monitoring:8080
      - MONITOR_API_KEY=${MONITOR_API_KEY:-}
      # IP-Zugangsbeschränkung (leer = kein Filter)
      # Beispiel: ALLOWED_IPS=192.168.1.0/24,10.0.0.5
      - ALLOWED_IPS=
      # Auf true setzen wenn hinter Reverse-Proxy (X-Forwarded-For auswerten)
      # Wird ignoriert wenn TRUSTED_PROXIES gesetzt ist.
      - TRUST_PROXY_HEADERS=false
      # Empfohlen statt TRUST_PROXY_HEADERS: IPs/CIDRs der Reverse-Proxies
      # Beispiel: TRUSTED_PROXIES=172.17.0.1,10.0.0.0/8
      - TRUSTED_PROXIES=
      # Redis fuer Rate-Limit ueber mehrere Worker hinweg
      - REDIS_URL=redis://redis:6379/0
      # Audit-Log-Aufbewahrung in Tagen (0 = unbegrenzt); taeglicher Prune-Job.
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-365}
      # SMTP-Relay fuer E-Mail-Benachrichtigungen (Notification-Hub). Leerer
      # SMTP_HOST = E-Mail-Kanal deaktiviert (Outbox-Eintraege scheitern dann und
      # werden nach NOTIFICATION_MAX_ATTEMPTS verworfen). Kein lokaler MTA: auf
      # einen externen Relay zeigen (587 STARTTLS oder 465 SMTPS).
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-adminhelper@localhost}
    logging: *default-logging
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  # Dedicated scheduler process: the SINGLE APScheduler instance. The web
  # workers (server) run uvicorn only and never start the scheduler, so its jobs
  # (outbox drain, cleanups, scheduled-hook reconcile) run exactly once even with
  # WEB_CONCURRENCY > 1. Do NOT scale this service beyond one replica.
  scheduler:
    image: ${SERVER_IMAGE:-ghcr.io/ks98/adminhelper/server:latest}
    environment:
      - RUN_MODE=scheduler
      - TZ=${TZ:-Europe/Berlin}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=postgresql+psycopg://adminhelper:${POSTGRES_PASSWORD}@postgres:5432/adminhelper
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=adminhelper
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - MONITOR_API_KEY=${MONITOR_API_KEY:-}
      - REDIS_URL=redis://redis:6379/0
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-365}
      - NOTIFICATION_RETENTION_DAYS=${NOTIFICATION_RETENTION_DAYS:-90}
      - NOTIFICATION_MAX_ATTEMPTS=${NOTIFICATION_MAX_ATTEMPTS:-5}
      # SMTP: the outbox drain runs here, so the scheduler needs the relay too.
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-adminhelper@localhost}
    volumes:
      # Shared DATA_DIR so the auto-generated SECRET_KEY matches the web service.
      - ./data:/app/data
    logging: *default-logging
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  gateway:
    image: ${GATEWAY_IMAGE:-ghcr.io/ks98/adminhelper/gateway:latest}
    # The single public TLS/mTLS edge for the HTTP planes (ADR 0001 D11).
    #   :443   data plane  -> server  (permissive mTLS this phase; CERT_REQUIRED in A8)
    #   :8444  enroll plane -> ca-issuer (certless, token-gated)
    #   :8445  repo plane   -> static GPG-signed apt/rpm repo (certless, ./repo)
    # TLS material (access-signed leaf + CA bundle) is provisioned by the
    # ca-issuer into the shared gateway-certs volume; the entrypoint waits for it.
    ports:
      - "443:443"
      - "${ENROLL_PORT:-8444}:8444"
      - "${REPO_PORT:-8445}:8445"
    volumes:
      - gateway-certs:/etc/nginx/certs:ro
      # Agent package repo the updater populates host-side (empty/absent → 404).
      - ./repo:/usr/share/nginx/repo:ro
    environment:
      - TZ=${TZ:-Europe/Berlin}
      # Default true → data plane :443 is CERT_REQUIRED (ssl_verify_client on);
      # set false for a permissive window (optional). Flip together with the
      # server's MTLS_ENFORCE. scripts/install.sh sets up the first admin's cert
      # before arming, so a fresh install is usable enforced (see docs/Betrieb).
      - MTLS_ENFORCE=${MTLS_ENFORCE:-true}
    logging: *default-logging
    restart: unless-stopped
    depends_on:
      # nginx resolves the upstream names at startup, so both must already exist.
      ca-issuer:
        condition: service_started
      server:
        condition: service_started

  ca-issuer:
    image: ${CA_ISSUER_IMAGE:-ghcr.io/ks98/adminhelper/ca-issuer:latest}
    # Internal-only PKI plane: the single signing capability (D6). Reachable only
    # via the gateway's enroll listener; never from the host (no port mapping).
    expose:
      - "8090"
    volumes:
      # The PKI hierarchy (Root + intermediates) — issuer-only. NEVER mounted
      # into the gateway or frps (the signing keys stay here, D6).
      - ca-pki:/app/data
      # Outbound drop for the gateway's TLS material (leaf + key + CA bundle).
      - gateway-certs:/app/gateway-certs
      # Outbound drop for the frps TLS material (tunnel-signed leaf + key + chain).
      - frps-certs:/app/frps-certs
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - DOMAIN=${DOMAIN:-localhost}
      - EXTRA_SANS=${EXTRA_SANS:-}
      # Encrypts the cold Root key at rest (D7). Required on first boot to create
      # the hierarchy. Set via ./scripts/init-secrets.sh; keep it OUT of backups.
      - CA_ROOT_PASSPHRASE=${CA_ROOT_PASSPHRASE:-}
      - CA_GATEWAY_CERT_DIR=/app/gateway-certs
      # frps server cert under the tunnel intermediate (A7). SERVER_ADDR must match
      # the public frps address frpc connects to (the DB's server_addr); defaults
      # to DOMAIN.
      - CA_FRPS_CERT_DIR=/app/frps-certs
      - CA_FRPS_SERVER_ADDR=${FRP_SERVER_ADDR:-${DOMAIN:-localhost}}
      # Reads enrollment tokens + identity revocations from the shared DB (the
      # server's tables); the issuer only ever READS them.
      - DATABASE_URL=postgresql+psycopg://adminhelper:${POSTGRES_PASSWORD}@postgres:5432/adminhelper
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/healthz').read()"
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    logging: *default-logging
    restart: unless-stopped

  frps:
    # Pinned to match the bundled frpc (FRP_VERSION in .github/workflows/*.yml).
    # Keep both in lockstep — a floating :latest can jump the server ahead of
    # the client and break the tunnel (e.g. wire-protocol changes).
    image: snowdreamtech/frps:0.69.1@sha256:a615a3e42f174050fbd902a989f9c21eed2dc0b016932d10ab599743cca0e41a
    ports:
      - "${FRP_BIND_PORT:-7000}:7000"
      - "${FRP_HTTPS_PORT:-7443}:443"
    volumes:
      - frp-config:/etc/frp:ro
      # TLS material under the tunnel intermediate, provisioned by the ca-issuer
      # (A7) — the CA private key never reaches this internet-facing container.
      - frps-certs:/etc/frp-pki:ro
    logging: *default-logging
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
      ca-issuer:
        condition: service_healthy

  monitoring:
    image: ${MONITORING_IMAGE:-ghcr.io/ks98/adminhelper/monitoring:latest}
    # Internal-only (like postgres/redis/victoria): agents push metrics via the
    # server's public 443 proxy at /api/monitoring/agent/{id}/report, so the
    # monitoring admin API + /docs are never reachable directly from the host.
    expose:
      - "8080"
    volumes:
      - monitoring-data:/app/data
    environment:
      - TZ=${TZ:-Europe/Berlin}
      # Log verbosity for the app + uvicorn loggers (DEBUG/INFO/WARNING/ERROR).
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - VICTORIA_METRICS_URL=http://victoria:8428
      - MONITOR_API_KEY=${MONITOR_API_KEY:-}
      # Notification hub: push check-status transitions to the server, which
      # resolves which users to notify (best-effort; auth via MONITOR_API_KEY as
      # X-Internal-Key). No depends_on — the push tolerates the server being down
      # and a hard dependency would be circular (server proxies to monitoring).
      - SERVER_HUB_URL=http://server:8080
      # Postgres
      - DATABASE_URL=postgresql+psycopg://adminhelper:${POSTGRES_PASSWORD}@postgres:5432/adminhelper_monitor
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=adminhelper
      - PGPASSWORD=${POSTGRES_PASSWORD}
    logging: *default-logging
    restart: unless-stopped
    depends_on:
      victoria:
        condition: service_started
      postgres:
        condition: service_healthy

  victoria:
    image: victoriametrics/victoria-metrics:v1.144.0@sha256:dc030542eb0cd262287c9ec32e5867f8dcccc0efd5906c10f7fc8176c53d34d7
    environment:
      - TZ=${TZ:-Europe/Berlin}
    volumes:
      - victoria-data:/victoria-metrics-data
    command:
      - "-retentionPeriod=90d"
      - "-storageDataPath=/victoria-metrics-data"
    expose:
      - "8428"
    logging: *default-logging
    restart: unless-stopped

  # Optionaler Postgres-Backup-Container.
  # Aktivieren mit: docker compose up -d pg-backup
  # Schreibt taeglich pg_dump-Backups beider DBs nach ./backups/.
  # Retention 7 Tage rolling.
  #
  # pg-backup:
  #   image: postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
  #   volumes:
  #     - ./backups:/backups
  #     - ./scripts/pg-backup.sh:/usr/local/bin/pg-backup.sh:ro
  #   environment:
  #     - PGHOST=postgres
  #     - PGUSER=adminhelper
  #     - PGPASSWORD=${POSTGRES_PASSWORD}
  #     - BACKUP_DIR=/backups
  #     - RETENTION_DAYS=7
  #   entrypoint: ["sh", "-c", "while true; do /usr/local/bin/pg-backup.sh; sleep 86400; done"]
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  frp-config:
  # PKI hierarchy of the ca-issuer (Root + intermediates) — the backup crown
  # jewel (ADR 0001 §5). Isolated from the gateway/frps.
  ca-pki:
  # Gateway TLS material the issuer provisions and the gateway consumes (ro).
  gateway-certs:
  # frps TLS material the issuer provisions (tunnel-signed) and frps consumes (ro).
  frps-certs:
  monitoring-data:
  victoria-data:
  postgres-data:

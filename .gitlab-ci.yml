stages:
  - docker
  - build
  - publish

variables:
  DEBIAN_FRONTEND: noninteractive
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUSTUP_HOME: "$CI_PROJECT_DIR/.rustup"
  REGISTRY_HOST: docker.nevondo.com
  DOCKER_IMAGE: $REGISTRY_HOST/$CI_PROJECT_PATH/server

cache:
  key:
    files:
      - client/src-tauri/Cargo.lock
  paths:
    - .cargo/bin
    - .cargo/registry/index
    - .cargo/registry/cache
    - .cargo/git/db
    - .rustup/toolchains
    - .rustup/update-hashes
    - client/src-tauri/target

.tauri_trixie_base:
  stage: build
  image: debian:trixie
  before_script:
    - apt-get update
    - >
      apt-get install -y --no-install-recommends
      ca-certificates
      curl
      build-essential
      pkg-config
      file
      xz-utils
      git
      libssl-dev
      libgtk-3-dev
      libwebkit2gtk-4.1-dev
      librsvg2-dev
      libxdo-dev
      patchelf
    - apt-get install -y --no-install-recommends libayatana-appindicator3-dev || apt-get install -y --no-install-recommends libappindicator3-dev
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
    - . "$CARGO_HOME/env"
    - rustup default stable
    - |
      if cargo-tauri --version 2>/dev/null | grep -Eq ' 2\.'; then
        echo "Using cached $(cargo-tauri --version)"
      else
        cargo install tauri-cli --locked --version '^2'
      fi

build_deb_trixie:
  extends: .tauri_trixie_base
  needs: []
  script:
    - . "$CARGO_HOME/env"
    - cd client/src-tauri
    - cargo tauri build --bundles deb
    - ls -lah target/release/bundle/deb
  artifacts:
    name: "simple-remote-manager-deb-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: 14 days
    paths:
      - client/src-tauri/target/release/bundle/deb/*.deb
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

build_rpm_trixie:
  extends: .tauri_trixie_base
  needs: []
  before_script:
    - !reference [.tauri_trixie_base, before_script]
    - apt-get install -y --no-install-recommends rpm
  script:
    - . "$CARGO_HOME/env"
    - cd client/src-tauri
    - cargo tauri build --bundles rpm
    - ls -lah target/release/bundle/rpm
  artifacts:
    name: "simple-remote-manager-rpm-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: 14 days
    paths:
      - client/src-tauri/target/release/bundle/rpm/*.rpm
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

build_binary_trixie:
  extends: .tauri_trixie_base
  needs: []
  script:
    - . "$CARGO_HOME/env"
    - cd client/src-tauri
    - cargo build --release
    - sha256sum target/release/simple_remote_manager > target/release/simple_remote_manager.sha256
    - ls -lah target/release/simple_remote_manager target/release/simple_remote_manager.sha256
  artifacts:
    name: "simple-remote-manager-bin-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: 14 days
    paths:
      - client/src-tauri/target/release/simple_remote_manager
      - client/src-tauri/target/release/simple_remote_manager.sha256
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

docker_server:
  stage: docker
  image: docker:27
  needs: []
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$REGISTRY_HOST"
  script:
    - |
      docker build \
        --build-arg VERSION="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}" \
        -t "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA" \
        -t "$DOCKER_IMAGE:latest" \
        ./server
    - docker push "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$DOCKER_IMAGE:latest"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA" "$DOCKER_IMAGE:$CI_COMMIT_TAG"
        docker push "$DOCKER_IMAGE:$CI_COMMIT_TAG"
      fi
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

publish_deb_trixie:
  stage: publish
  image: debian:trixie
  needs:
    - build_deb_trixie
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_REF_PROTECTED == "true"'
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends bash ca-certificates curl python3
    - chmod +x client/scripts/ci_publish_via_api.sh
  script:
    - client/scripts/ci_publish_via_api.sh client/src-tauri/target/release/bundle/deb

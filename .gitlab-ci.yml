stages:
  - check
  - docker
  - download
  - build
  - publish

variables:
  DEBIAN_FRONTEND: noninteractive
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUSTUP_HOME: "$CI_PROJECT_DIR/.rustup"
  REGISTRY_HOST: docker.nevondo.com
  DOCKER_IMAGE: $REGISTRY_HOST/$CI_PROJECT_PATH/server

cache:
  key:
    files:
      - desktop/src-tauri/Cargo.lock
  paths:
    - .cargo/bin
    - .cargo/registry/index
    - .cargo/registry/cache
    - .cargo/git/db
    - .rustup/toolchains
    - .rustup/update-hashes
    - desktop/src-tauri/target

.tauri_trixie_base:
  stage: build
  image: debian:trixie
  before_script:
    - mkdir -p desktop/src-tauri/binaries
    - cp frpc desktop/src-tauri/binaries/frpc-x86_64-unknown-linux-gnu
    - chmod +x desktop/src-tauri/binaries/frpc-x86_64-unknown-linux-gnu
    - apt-get update
    - >
      apt-get install -y --no-install-recommends
      ca-certificates
      curl
      build-essential
      pkg-config
      file
      xz-utils
      git
      libssl-dev
      libgtk-3-dev
      libwebkit2gtk-4.1-dev
      librsvg2-dev
      libxdo-dev
      patchelf
    - apt-get install -y --no-install-recommends libayatana-appindicator3-dev || apt-get install -y --no-install-recommends libappindicator3-dev
    - apt-get install -y --no-install-recommends nodejs npm
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
    - . "$CARGO_HOME/env"
    - rustup default stable
    - |
      if cargo-tauri --version 2>/dev/null | grep -Eq ' 2\.'; then
        echo "Using cached $(cargo-tauri --version)"
      else
        cargo install tauri-cli --locked --version '^2'
      fi
    - npm --prefix desktop-src ci

build_deb_trixie:
  extends: .tauri_trixie_base
  needs: [download_frpc]
  script:
    - . "$CARGO_HOME/env"
    - cd desktop/src-tauri
    - cargo tauri build --bundles deb
    - ls -lah target/release/bundle/deb
  artifacts:
    name: "adminhelper-deb-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: 14 days
    paths:
      - desktop/src-tauri/target/release/bundle/deb/*.deb
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

build_rpm_trixie:
  extends: .tauri_trixie_base
  needs: [download_frpc]
  before_script:
    - !reference [.tauri_trixie_base, before_script]
    - apt-get install -y --no-install-recommends rpm
  script:
    - . "$CARGO_HOME/env"
    - cd desktop/src-tauri
    - cargo tauri build --bundles rpm
    - ls -lah target/release/bundle/rpm
  artifacts:
    name: "adminhelper-rpm-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: 14 days
    paths:
      - desktop/src-tauri/target/release/bundle/rpm/*.rpm
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

build_binary_trixie:
  extends: .tauri_trixie_base
  needs: [download_frpc]
  script:
    - . "$CARGO_HOME/env"
    - cd desktop/src-tauri
    - cargo build --release
    - sha256sum target/release/adminhelper > target/release/adminhelper.sha256
    - ls -lah target/release/adminhelper target/release/adminhelper.sha256
  artifacts:
    name: "adminhelper-bin-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: 14 days
    paths:
      - desktop/src-tauri/target/release/adminhelper
      - desktop/src-tauri/target/release/adminhelper.sha256
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

frontend_check:
  stage: check
  image: node:22-alpine
  needs: []
  before_script:
    - cd frontend-src
    - npm ci --no-audit --no-fund
  script:
    - npm run check
    - npm run lint
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
      changes:
        - frontend-src/**/*

frontend_e2e:
  stage: check
  image: mcr.microsoft.com/playwright:v1.59.1-jammy
  needs: []
  before_script:
    - cd frontend-src
    - npm ci --no-audit --no-fund
  script:
    - npx playwright test
  artifacts:
    name: "playwright-report-$CI_COMMIT_SHORT_SHA"
    when: always
    expire_in: 7 days
    paths:
      - frontend-src/playwright-report/
      - frontend-src/test-results/
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
      changes:
        - frontend-src/**/*

desktop_check:
  stage: check
  image: node:22-alpine
  needs: []
  before_script:
    - cd desktop-src
    - npm ci --no-audit --no-fund
  script:
    - npm run check
    - npm run test
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
      changes:
        - desktop-src/**/*

docker_server:
  stage: docker
  image: docker:27
  needs: []
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$REGISTRY_HOST"
  script:
    - |
      docker build \
        --build-arg VERSION="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}" \
        -f Dockerfile \
        -t "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA" \
        -t "$DOCKER_IMAGE:latest" \
        .
    - docker push "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$DOCKER_IMAGE:latest"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA" "$DOCKER_IMAGE:$CI_COMMIT_TAG"
        docker push "$DOCKER_IMAGE:$CI_COMMIT_TAG"
      fi
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA" "$DOCKER_IMAGE:dev"
        docker push "$DOCKER_IMAGE:dev"
      fi
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

publish_deb_trixie:
  stage: publish
  image: debian:trixie
  needs:
    - build_deb_trixie
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_REF_PROTECTED == "true"'
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends bash ca-certificates curl python3
    - chmod +x desktop/scripts/ci_publish_via_api.sh
  script:
    - desktop/scripts/ci_publish_via_api.sh desktop/src-tauri/target/release/bundle/deb

# ── AdminHelper Agent (Go, unified) ──────────────────────────────────
download_frpc:
  stage: download
  image: alpine:3.20
  needs: []
  variables:
    FRP_VERSION: "0.61.1"
  script:
    - apk add --no-cache wget tar
    - wget -q "https://github.com/fatedier/frp/releases/download/v${FRP_VERSION}/frp_${FRP_VERSION}_linux_amd64.tar.gz"
    - tar xzf "frp_${FRP_VERSION}_linux_amd64.tar.gz"
    - cp "frp_${FRP_VERSION}_linux_amd64/frpc" .
    - chmod +x frpc
    - ./frpc --version
  artifacts:
    paths:
      - frpc
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
    - changes:
        - agent-go/**/*

build_go_agent:
  stage: build
  image: golang:1.24-bookworm
  needs: []
  variables:
    AGENT_VERSION: "0.20.0"
  script:
    - cd agent-go
    - GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=${AGENT_VERSION}" -o bin/adminhelper-agent ./cmd/adminhelper-agent
    - GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.version=${AGENT_VERSION}" -o bin/adminhelper-agent.exe ./cmd/adminhelper-agent
    - ./bin/adminhelper-agent version
  artifacts:
    paths:
      - agent-go/bin/adminhelper-agent
      - agent-go/bin/adminhelper-agent.exe
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
    - changes:
        - agent-go/**/*

build_agent_deb:
  stage: build
  image: debian:bookworm-slim
  needs: [download_frpc, build_go_agent]
  variables:
    AGENT_VERSION: "0.20.0"
  script:
    - apt-get update -qq && apt-get install -y -qq dpkg-dev > /dev/null
    - VERSION=${AGENT_VERSION} bash agent-go/build-deb.sh
  artifacts:
    name: "adminhelper-agent-deb-$CI_COMMIT_REF_SLUG"
    paths:
      - "adminhelper-agent_*.deb"
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
    - changes:
        - agent-go/**/*

build_agent_rpm:
  stage: build
  image: almalinux:9
  needs: [download_frpc, build_go_agent]
  variables:
    AGENT_VERSION: "0.20.0"
  script:
    - dnf install -y rpm-build tar gzip > /dev/null
    - VERSION=${AGENT_VERSION} bash agent-go/build-rpm.sh
  artifacts:
    name: "adminhelper-agent-rpm-$CI_COMMIT_REF_SLUG"
    paths:
      - "adminhelper-agent-*.rpm"
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
    - changes:
        - agent-go/**/*

publish_agent_deb:
  stage: publish
  image: debian:trixie
  needs: [build_agent_deb]
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_REF_PROTECTED == "true"'
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends bash ca-certificates curl python3
    - chmod +x desktop/scripts/ci_publish_via_api.sh
  script:
    - mkdir -p /tmp/agent-debs
    - cp adminhelper-agent_*.deb /tmp/agent-debs/
    - desktop/scripts/ci_publish_via_api.sh /tmp/agent-debs

stages:
  - docker
  - download
  - build
  - publish

variables:
  DEBIAN_FRONTEND: noninteractive
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUSTUP_HOME: "$CI_PROJECT_DIR/.rustup"
  REGISTRY_HOST: docker.nevondo.com
  DOCKER_IMAGE: $REGISTRY_HOST/$CI_PROJECT_PATH/server

cache:
  key:
    files:
      - desktop/src-tauri/Cargo.lock
  paths:
    - .cargo/bin
    - .cargo/registry/index
    - .cargo/registry/cache
    - .cargo/git/db
    - .rustup/toolchains
    - .rustup/update-hashes
    - desktop/src-tauri/target

.tauri_trixie_base:
  stage: build
  image: debian:trixie
  before_script:
    - apt-get update
    - >
      apt-get install -y --no-install-recommends
      ca-certificates
      curl
      build-essential
      pkg-config
      file
      xz-utils
      git
      libssl-dev
      libgtk-3-dev
      libwebkit2gtk-4.1-dev
      librsvg2-dev
      libxdo-dev
      patchelf
    - apt-get install -y --no-install-recommends libayatana-appindicator3-dev || apt-get install -y --no-install-recommends libappindicator3-dev
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
    - . "$CARGO_HOME/env"
    - rustup default stable
    - |
      if cargo-tauri --version 2>/dev/null | grep -Eq ' 2\.'; then
        echo "Using cached $(cargo-tauri --version)"
      else
        cargo install tauri-cli --locked --version '^2'
      fi

build_deb_trixie:
  extends: .tauri_trixie_base
  needs: []
  script:
    - . "$CARGO_HOME/env"
    - cd desktop/src-tauri
    - cargo tauri build --bundles deb
    - ls -lah target/release/bundle/deb
  artifacts:
    name: "simple-remote-manager-deb-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: 14 days
    paths:
      - desktop/src-tauri/target/release/bundle/deb/*.deb
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

build_rpm_trixie:
  extends: .tauri_trixie_base
  needs: []
  before_script:
    - !reference [.tauri_trixie_base, before_script]
    - apt-get install -y --no-install-recommends rpm
  script:
    - . "$CARGO_HOME/env"
    - cd desktop/src-tauri
    - cargo tauri build --bundles rpm
    - ls -lah target/release/bundle/rpm
  artifacts:
    name: "simple-remote-manager-rpm-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: 14 days
    paths:
      - desktop/src-tauri/target/release/bundle/rpm/*.rpm
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

build_binary_trixie:
  extends: .tauri_trixie_base
  needs: []
  script:
    - . "$CARGO_HOME/env"
    - cd desktop/src-tauri
    - cargo build --release
    - sha256sum target/release/simple_remote_manager > target/release/simple_remote_manager.sha256
    - ls -lah target/release/simple_remote_manager target/release/simple_remote_manager.sha256
  artifacts:
    name: "simple-remote-manager-bin-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: 14 days
    paths:
      - desktop/src-tauri/target/release/simple_remote_manager
      - desktop/src-tauri/target/release/simple_remote_manager.sha256
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

docker_server:
  stage: docker
  image: docker:27
  needs: []
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$REGISTRY_HOST"
  script:
    - |
      docker build \
        --build-arg VERSION="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}" \
        -t "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA" \
        -t "$DOCKER_IMAGE:latest" \
        ./server
    - docker push "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$DOCKER_IMAGE:latest"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA" "$DOCKER_IMAGE:$CI_COMMIT_TAG"
        docker push "$DOCKER_IMAGE:$CI_COMMIT_TAG"
      fi
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA" "$DOCKER_IMAGE:dev"
        docker push "$DOCKER_IMAGE:dev"
      fi
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

publish_deb_trixie:
  stage: publish
  image: debian:trixie
  needs:
    - build_deb_trixie
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_REF_PROTECTED == "true"'
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends bash ca-certificates curl python3
    - chmod +x desktop/scripts/ci_publish_via_api.sh
  script:
    - desktop/scripts/ci_publish_via_api.sh desktop/src-tauri/target/release/bundle/deb

publish_deb_dev:
  stage: publish
  image: debian:trixie
  needs:
    - build_deb_trixie
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends bash ca-certificates curl python3
    - chmod +x desktop/scripts/ci_publish_via_api.sh
  variables:
    APTLY_DISTRIBUTION: dev
  script:
    - desktop/scripts/ci_publish_via_api.sh desktop/src-tauri/target/release/bundle/deb

# ── FRP Client Package ────────────────────────────────────────────────
download_frpc:
  stage: download
  image: alpine:3.20
  needs: []
  variables:
    FRP_VERSION: "0.61.1"
  script:
    - apk add --no-cache wget tar
    - wget -q "https://github.com/fatedier/frp/releases/download/v${FRP_VERSION}/frp_${FRP_VERSION}_linux_amd64.tar.gz"
    - tar xzf "frp_${FRP_VERSION}_linux_amd64.tar.gz"
    - cp "frp_${FRP_VERSION}_linux_amd64/frpc" .
    - chmod +x frpc
    - ./frpc --version
  artifacts:
    paths:
      - frpc
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
    - changes:
        - agent/**/*

build_frpc_deb:
  stage: build
  image: debian:bookworm-slim
  needs: [download_frpc]
  variables:
    FRPC_PKG_VERSION: "0.1.0"
  script:
    - apt-get update -qq && apt-get install -y -qq dpkg-dev > /dev/null
    - VERSION=${FRPC_PKG_VERSION} bash agent/build-deb.sh
  artifacts:
    name: "srm-frpc-client-deb-$CI_COMMIT_REF_SLUG"
    paths:
      - "srm-frpc-client_*.deb"
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
    - changes:
        - agent/**/*

build_frpc_rpm:
  stage: build
  image: almalinux:9
  needs: [download_frpc]
  variables:
    FRPC_PKG_VERSION: "0.1.0"
  script:
    - dnf install -y rpm-build tar gzip > /dev/null
    - VERSION=${FRPC_PKG_VERSION} bash agent/build-rpm.sh
  artifacts:
    name: "srm-frpc-client-rpm-$CI_COMMIT_REF_SLUG"
    paths:
      - "srm-frpc-client-*.rpm"
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
    - changes:
        - agent/**/*

publish_frpc_deb:
  stage: publish
  image: curlimages/curl:latest
  needs: [build_frpc_deb]
  variables:
    FRPC_PKG_VERSION: "0.1.0"
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - DEB_FILE=$(ls srm-frpc-client_*.deb | head -1)
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "${DEB_FILE}" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/srm-frpc-desktop/${FRPC_PKG_VERSION}/${DEB_FILE}"

publish_frpc_deb_dev:
  stage: publish
  image: debian:trixie
  needs:
    - build_frpc_deb
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends bash ca-certificates curl python3
    - chmod +x desktop/scripts/ci_publish_via_api.sh
  variables:
    APTLY_DISTRIBUTION: dev
  script:
    - mkdir -p /tmp/frpc-debs
    - cp srm-frpc-client_*.deb /tmp/frpc-debs/
    - desktop/scripts/ci_publish_via_api.sh /tmp/frpc-debs

publish_frpc_rpm:
  stage: publish
  image: curlimages/curl:latest
  needs: [build_frpc_rpm]
  variables:
    FRPC_PKG_VERSION: "0.1.0"
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - RPM_FILE=$(ls srm-frpc-client-*.rpm | head -1)
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "${RPM_FILE}" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/srm-frpc-desktop/${FRPC_PKG_VERSION}/${RPM_FILE}"

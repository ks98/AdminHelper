stages:
  - build
  - publish

variables:
  DEBIAN_FRONTEND: noninteractive
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUSTUP_HOME: "$CI_PROJECT_DIR/.rustup"

cache:
  key:
    files:
      - src-tauri/Cargo.lock
  paths:
    - .cargo/bin
    - .cargo/registry/index
    - .cargo/registry/cache
    - .cargo/git/db
    - .rustup/toolchains
    - .rustup/update-hashes
    - src-tauri/target

.tauri_trixie_base:
  stage: build
  image: debian:trixie
  before_script:
    - apt-get update
    - >
      apt-get install -y --no-install-recommends
      ca-certificates
      curl
      build-essential
      pkg-config
      file
      xz-utils
      git
      libssl-dev
      libgtk-3-dev
      libwebkit2gtk-4.1-dev
      librsvg2-dev
      libxdo-dev
      patchelf
    - apt-get install -y --no-install-recommends libayatana-appindicator3-dev || apt-get install -y --no-install-recommends libappindicator3-dev
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
    - . "$CARGO_HOME/env"
    - rustup default stable
    - |
      if cargo-tauri --version 2>/dev/null | grep -Eq ' 2\.'; then
        echo "Using cached $(cargo-tauri --version)"
      else
        cargo install tauri-cli --locked --version '^2'
      fi

build_deb_trixie:
  extends: .tauri_trixie_base
  script:
    - . "$CARGO_HOME/env"
    - cd src-tauri
    - cargo tauri build --bundles deb
    - ls -lah target/release/bundle/deb
  artifacts:
    name: "simple-remote-manager-deb-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: 14 days
    paths:
      - src-tauri/target/release/bundle/deb/*.deb
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

build_binary_trixie:
  extends: .tauri_trixie_base
  script:
    - . "$CARGO_HOME/env"
    - cd src-tauri
    - cargo build --release
    - sha256sum target/release/simple_remote_manager > target/release/simple_remote_manager.sha256
    - ls -lah target/release/simple_remote_manager target/release/simple_remote_manager.sha256
  artifacts:
    name: "simple-remote-manager-bin-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: 14 days
    paths:
      - src-tauri/target/release/simple_remote_manager
      - src-tauri/target/release/simple_remote_manager.sha256
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

publish_deb_trixie:
  stage: publish
  image: debian:trixie
  needs:
    - build_deb_trixie
  rules:
    - if: '$CI_COMMIT_TAG'
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends bash ca-certificates curl
    - chmod +x scripts/ci_publish_via_api.sh
  script:
    - scripts/ci_publish_via_api.sh src-tauri/target/release/bundle/deb

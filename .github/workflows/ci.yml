name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FRP_VERSION: "0.61.1"
  # Pinned SHA-256 of the official frp release artifact (verified before use).
  FRP_SHA256_LINUX_AMD64: "bff260b68ca7b1461182a46c4f34e9709ba32764eed30a15dd94ac97f50a2c40"

jobs:
  server:
    name: Server (pytest, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: adminhelper
          POSTGRES_PASSWORD: cipw
          POSTGRES_DB: adminhelper
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U adminhelper -d adminhelper"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # conftest.py uses DATABASE_URL directly when set (CI mode) instead of
      # spinning up a testcontainers Postgres. postgresql:// is normalised to
      # the psycopg3 driver inside conftest.
      DATABASE_URL: postgresql+psycopg://adminhelper:cipw@localhost:5432/adminhelper
      DATA_DIR: /tmp/adminhelper-test-data
      SECRET_KEY: ci-test-secret-key
      ADMIN_PASSWORD: ciadmin
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: apps/server/requirements*.txt
      - name: Install dependencies
        working-directory: apps/server
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run pytest
        working-directory: apps/server
        run: pytest -q

  monitoring:
    name: Monitoring (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/monitoring/requirements.txt
      - name: Install dependencies
        working-directory: apps/monitoring
        run: pip install -r requirements.txt pytest
      - name: Run pytest
        working-directory: apps/monitoring
        run: python -m pytest -q

  agent:
    name: Go Agent (gofmt + vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache-dependency-path: apps/agent/go.sum
      - name: gofmt
        working-directory: apps/agent
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needs to be run on:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        working-directory: apps/agent
        run: go vet ./...
      - name: go test
        working-directory: apps/agent
        run: go test ./...
      - name: Cross-compile (linux + windows)
        working-directory: apps/agent
        run: |
          GOOS=linux GOARCH=amd64 go build -o /dev/null ./cmd/adminhelper-agent
          GOOS=windows GOARCH=amd64 go build -o /dev/null ./cmd/adminhelper-agent

  desktop-ui:
    name: Desktop-UI (svelte-check + lint + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/ui/package-lock.json
      - name: npm ci
        working-directory: apps/desktop/ui
        run: npm ci --no-audit --no-fund
      - name: svelte-check
        working-directory: apps/desktop/ui
        run: npm run check
      - name: eslint + prettier
        working-directory: apps/desktop/ui
        run: npm run lint
      - name: vitest
        working-directory: apps/desktop/ui
        run: npm run test

  frontend:
    name: Web-Frontend (check + lint + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: npm ci
        working-directory: apps/web
        run: npm ci --no-audit --no-fund
      - name: svelte-check
        working-directory: apps/web
        run: npm run check
      - name: eslint + prettier
        working-directory: apps/web
        run: npm run lint
      - name: vitest
        working-directory: apps/web
        run: npm run test:unit

  frontend-e2e:
    name: Web-Frontend (Playwright E2E)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: npm ci
        working-directory: apps/web
        run: npm ci --no-audit --no-fund
      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps
      - name: Playwright test
        working-directory: apps/web
        run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 7

  extension:
    name: Extension (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: node --test
        working-directory: apps/extension
        run: node --test

  rust:
    name: Desktop-Backend (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev libxdo-dev \
            libayatana-appindicator3-dev libssl-dev patchelf file
      - name: frpc sidecar (externalBin must resolve for tauri-build)
        run: |
          curl -fsSL -o frpc.tar.gz \
            "https://github.com/fatedier/frp/releases/download/v${FRP_VERSION}/frp_${FRP_VERSION}_linux_amd64.tar.gz"
          echo "${FRP_SHA256_LINUX_AMD64}  frpc.tar.gz" | sha256sum -c -
          tar xzf frpc.tar.gz
          mkdir -p apps/desktop/src-tauri/binaries
          cp "frp_${FRP_VERSION}_linux_amd64/frpc" \
            apps/desktop/src-tauri/binaries/frpc-x86_64-unknown-linux-gnu
          chmod +x apps/desktop/src-tauri/binaries/frpc-x86_64-unknown-linux-gnu
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: cargo fmt
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy -- -D warnings
      - name: cargo test
        working-directory: apps/desktop/src-tauri
        run: cargo test

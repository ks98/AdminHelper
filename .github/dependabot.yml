version: 2
updates:
  # GitHub Actions — keep the SHA-pinned third-party actions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Python services
  - package-ecosystem: pip
    directory: "/apps/server"
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]
  - package-ecosystem: pip
    directory: "/apps/monitoring"
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]

  # Frontends (Svelte/Vite)
  - package-ecosystem: npm
    directory: "/apps/web"
    schedule:
      interval: weekly
    groups:
      npm:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: "/apps/desktop/ui"
    schedule:
      interval: weekly
    groups:
      npm:
        patterns: ["*"]

  # Go agent
  - package-ecosystem: gomod
    directory: "/apps/agent"
    schedule:
      interval: weekly
    groups:
      go:
        patterns: ["*"]

  # Rust/Tauri desktop backend
  - package-ecosystem: cargo
    directory: "/apps/desktop/src-tauri"
    schedule:
      interval: weekly
    groups:
      cargo:
        patterns: ["*"]
    ignore:
      # keyring 4.x is the CLI/sample crate: it no longer re-exports Entry/Error
      # (the library moved to keyring-core) and its unconditional db-keystore
      # dependency drags in a full SQL engine (Turso) + full-text search (Tantivy)
      # + bindgen (+160 crates) just to store a few secrets. We stay on the lean
      # 3.x library line; revisit only if a keyring CVE appears or a v4-only
      # feature is needed.
      - dependency-name: "keyring"
        update-types: ["version-update:semver-major"]

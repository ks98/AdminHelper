# AdminHelper TLS/mTLS gateway (ADR 0001 D11).
# The single public TLS edge for the HTTP planes. Terminates TLS+mTLS,
# forwards the verified client identity to internal-only upstreams. Holds no
# signing key (only the access-signed server leaf + the CA certs for client
# verification) — so a gateway compromise threatens header integrity, not the CA.
# frps is NOT behind this gateway (own protocol, own mTLS edge).

events {}

http {
    # Internal-only upstreams (resolved on the compose network; no host ports).
    upstream app {
        server server:8080;
    }
    upstream issuer {
        server ca-issuer:8090;
    }

    # Rate-limit the certless enroll plane (ADR 0003 §5). Enrollment is rare and
    # token-gated (single-use, 10-min TTL), so a tight per-IP limit blunts token
    # brute-force / enroll flooding on the only certless surface without
    # affecting legitimate one-off enrollments. 429 (not the default 503) tells a
    # client it was throttled.
    limit_req_zone $binary_remote_addr zone=enroll:10m rate=10r/s;
    limit_req_status 429;

    # ── Data plane :443 — mTLS ───────────────────────────────────────────────
    # The verify mode (optional vs on) is generated by the entrypoint from the
    # MTLS_ENFORCE env var (A8): "optional" = permissive rollout (default),
    # "on" = CERT_REQUIRED. Either way the app decides per route via the header;
    # flipping is an operator action once every client holds a cert (see docs).
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/gateway-fullchain.pem; # access leaf + intermediate
        ssl_certificate_key /etc/nginx/certs/gateway.key;
        ssl_client_certificate /etc/nginx/certs/client-ca.pem;      # root + intermediate (verify clients)
        include /etc/nginx/snippets/data-plane-mtls.conf;           # ssl_verify_client (A8, env-driven)
        ssl_verify_depth 2;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Header hygiene: these are set from the VERIFIED cert and thereby
        # overwrite anything a client tried to smuggle in (proxy_set_header
        # replaces the inbound value of the same name).
        proxy_set_header X-Client-Verify  $ssl_client_verify;
        proxy_set_header X-Client-Cert    $ssl_client_escaped_cert;
        proxy_set_header X-Client-Cert-CN $ssl_client_s_dn;
        proxy_set_header Host             $host;
        proxy_set_header X-Forwarded-For  $remote_addr;

        # Renewal is served by the issuer (it needs the verified client cert,
        # forwarded above as X-Client-Cert / X-Client-Verify).
        location = /ca/renew {
            proxy_pass http://issuer/renew;
        }

        # Everything else is the application.
        location / {
            proxy_pass http://app;
        }
    }

    # ── Enrollment plane :8444 — certless, token-gated by the issuer ─────────
    # New clients have no cert yet; TLS still protects the token in transit and
    # the client TOFU-pins the CA here. Only /enroll is exposed.
    server {
        listen 8444 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/gateway-fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/gateway.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Strip any inbound client-identity headers — this plane is certless and
        # must never let a caller assert an identity.
        proxy_set_header X-Client-Verify "";
        proxy_set_header X-Client-Cert    "";
        proxy_set_header X-Client-Cert-CN "";

        location = /enroll {
            limit_req zone=enroll burst=20 nodelay;
            proxy_pass http://issuer/enroll;
        }

        location / {
            return 404;
        }
    }

    # ── Repo plane :8445 — certless static APT/RPM repo for the agent ─────────
    # Serves the GPG-signed package repo (apt + rpm) so agent hosts can run
    # `apt upgrade` / `dnf upgrade`. Authenticity comes from the repo's OpenPGP
    # signature (InRelease / repomd.xml.asc), NOT the transport — TLS only adds
    # integrity, and the client pins this gateway's CA per-repo (apt CAInfo /
    # dnf sslcacert), never system-wide. Certless on purpose: a host that is not
    # yet enrolled must still be able to fetch the agent package to bootstrap.
    # Content is a read-only bind mount (host ./repo) the updater populates; a
    # missing/empty mount simply 404s (nginx checks the root per request).
    server {
        listen 8445 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/gateway-fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/gateway.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        root /usr/share/nginx/repo;
        default_type application/octet-stream;
        autoindex off;

        # Only the two repo subtrees are reachable; everything else is 404.
        location ~ ^/(apt|rpm)/ {
        }
        location / {
            return 404;
        }
    }
}
